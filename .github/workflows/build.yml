name: Build & Release

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: chmod +x gradlew && ./gradlew build

      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoatHornDetector
          path: build/libs/GoatHornDetector-*.jar

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: GoatHornDetector
          path: build/libs/

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' build.gradle | sed 's/.*= *//; s/["\x27]//g' | head -1)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION"

      - name: Generate release tag
        id: tag
        run: |
          TAG="v$(date +'%Y%m%d.%H%M')"
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "tag=$TAG"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: "Build ${{ steps.tag.outputs.TAG }}"
          body: |
            Auto-built from commit ${{ github.sha }}
            
            Plugin version: ${{ steps.version.outputs.VERSION }}
          files: |
            build/libs/GoatHornDetector-*.jar
          generate_release_notes: true